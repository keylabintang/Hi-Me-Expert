<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Detail Sesi — Hi-Me Expert</title>
  <link rel="stylesheet" href="../../css/global.css">
  <style>
    /* ─── Header ─── */
    .page-header {
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      padding: 0 20px; position: sticky; top: 0; z-index: 10;
    }
    .header-row {
      display: flex; align-items: center; gap: 12px; padding: 14px 0;
    }
    .back-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 4px; flex-shrink: 0;
    }
    .header-title { font-size: 17px; font-weight: 800; color: var(--text-primary); }

    /* ─── Hero Card ─── */
    .hero-card {
      margin: 20px 20px 0;
      background: var(--bg-card); border-radius: var(--r-lg);
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
      padding: 20px;
    }
    .hero-top {
      display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
    }
    .hero-info {}
    .hero-name { font-size: 17px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
    .hero-badges { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .hero-divider { height: 1px; background: var(--border); margin: 16px 0; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .info-cell {}
    .info-cell-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
    .info-cell-val   { font-size: 14px; font-weight: 700; color: var(--text-primary); }
    .info-cell-val.primary { color: var(--primary); }

    /* Type chip */
    .type-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 700;
    }
    .type-chip.chat    { background: rgba(58,134,255,.1);  color: #3A86FF; }
    .type-chip.call    { background: rgba(93,186,132,.1);  color: #5DBA84; }
    .type-chip.offline { background: rgba(244,162,97,.1);  color: #E07B39; }

    /* Status pill */
    .status-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 100px; font-size: 12px; font-weight: 700;
    }
    .status-pill.done     { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
    .status-pill.active   { background: rgba(34,197,94,.12); color: #16A34A; }
    .status-pill.upcoming { background: var(--primary-pale); color: var(--primary); }
    .status-pill.pending  { background: rgba(100,116,139,.1); color: var(--text-muted); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-dot.done     { background: var(--text-muted); }
    .status-dot.active   { background: #22C55E; }
    .status-dot.upcoming { background: var(--primary); }
    .status-dot.pending  { background: #94A3B8; }

    /* ─── Section Cards ─── */
    .section-card {
      margin: 14px 20px 0;
      background: var(--bg-card); border-radius: var(--r-lg);
      border: 1px solid var(--border); box-shadow: var(--shadow-xs);
      overflow: hidden;
    }
    .section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted);
      padding: 14px 16px 0;
    }
    .section-body { padding: 10px 16px 16px; }

    .detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-key { font-size: 12px; color: var(--text-muted); font-weight: 600; }
    .detail-val { font-size: 13px; font-weight: 700; color: var(--text-primary); text-align: right; }
    .detail-val.accent { color: var(--primary); }

    /* Note box */
    .note-box {
      background: var(--bg); border-radius: var(--r-sm);
      padding: 12px 14px; font-size: 13px; color: var(--text-secondary);
      line-height: 1.7; border-left: 3px solid var(--primary-pale);
    }

    /* ─── Action Bar ─── */
    .action-bar {
      position: sticky; bottom: 0;
      background: var(--bg-card); border-top: 1px solid var(--border);
      padding: 14px 20px calc(14px + env(safe-area-inset-bottom, 0));
    }
    .action-row { display: flex; gap: 10px; }

    /* ─── Warning Banner ─── */
    .info-banner {
      margin: 14px 20px 0;
      border-radius: var(--r-md); padding: 12px 14px;
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 12px; line-height: 1.5;
    }
    .info-banner.blue  { background: rgba(58,134,255,.08); border: 1px solid rgba(58,134,255,.2); color: #1D4ED8; }
    .info-banner.green { background: rgba(93,186,132,.1);  border: 1px solid rgba(93,186,132,.25); color: #15803D; }
    .info-banner.warn  { background: rgba(244,162,97,.1);  border: 1px solid rgba(244,162,97,.3); color: #92400E; }
    .info-banner svg   { flex-shrink: 0; margin-top: 1px; }

    /* ─── Reject Sheet ─── */
    .sheet-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100;
      display: none; align-items: flex-end; justify-content: center;
    }
    .sheet-overlay.open { display: flex; }
    .sheet-panel {
      width: 390px; background: var(--bg-card);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      padding: 0 0 36px; max-height: 75vh; overflow-y: auto;
      animation: slideUp .25s ease;
    }
    @media (max-width: 430px) { .sheet-panel { width: 100%; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-handle { width: 36px; height: 4px; background: var(--border-dark); border-radius: 2px; margin: 12px auto 8px; }
    .sheet-title  { font-size: 16px; font-weight: 800; padding: 8px 20px 16px; border-bottom: 1px solid var(--border); }
    .sheet-body   { padding: 20px; }

    .reason-option {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .reason-option:last-child { border-bottom: none; }
    .reason-radio {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--border-dark); flex-shrink: 0; position: relative;
    }
    .reason-option.selected .reason-radio {
      border-color: var(--primary); background: var(--primary);
    }
    .reason-option.selected .reason-radio::after {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: white; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
    }
    .reason-text { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .reason-input {
      width: 100%; margin-top: 10px; padding: 10px 12px;
      border: 1.5px solid var(--border); border-radius: var(--r-sm);
      font-size: 13px; color: var(--text-primary); background: var(--bg);
      resize: none; display: none;
    }
    .reason-input.visible { display: block; }

    /* ─── Toast ─── */
    .session-detail-toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1F2937; color: white; border-radius: var(--r-sm);
      padding: 10px 18px; font-size: 13px; font-weight: 600;
      opacity: 0; transition: all .25s; pointer-events: none; z-index: 200; white-space: nowrap;
    }
    .session-detail-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="phone">

  <!-- Header -->
  <div class="page-header">
    <div class="statusbar">
      <span class="status-time" id="headerTime">09:41</span>
      <div class="status-icons">
        <svg class="icon-svg" width="14" height="14" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3v4M8 3v4M2 11h20"/></svg>
      </div>
    </div>
    <div class="header-row">
      <button class="back-btn" onclick="goBack()">
        <svg class="icon-svg" width="22" height="22" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="header-title">Detail Sesi</div>
    </div>
  </div>

  <div class="scroll-area" style="padding-bottom: 100px;" id="mainContent">
    <!-- Filled by JS -->
  </div>

  <!-- Action Bar -->
  <div class="action-bar" id="actionBar"></div>

</div>

<!-- Reject Sheet -->
<div class="sheet-overlay" id="rejectSheet" onclick="overlayClick(event,'rejectSheet')">
  <div class="sheet-panel">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Alasan Penolakan</div>
    <div class="sheet-body">
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Alasan ini akan dikirimkan sebagai notifikasi kepada pengguna.</p>
      <div id="reasonList">
        <div class="reason-option" onclick="selectReason(this,'Jadwal Sudah Penuh')">
          <div class="reason-radio"></div><div class="reason-text">Jadwal Sudah Penuh</div>
        </div>
        <div class="reason-option" onclick="selectReason(this,'Tidak Sesuai Spesialisasi')">
          <div class="reason-radio"></div><div class="reason-text">Tidak Sesuai Spesialisasi</div>
        </div>
        <div class="reason-option" onclick="selectReason(this,'Darurat Pribadi')">
          <div class="reason-radio"></div><div class="reason-text">Darurat Pribadi</div>
        </div>
        <div class="reason-option" onclick="selectReason(this,'Lainnya')">
          <div class="reason-radio"></div><div class="reason-text">Lainnya</div>
        </div>
      </div>
      <textarea class="reason-input" id="reasonInput" rows="3" placeholder="Tulis alasan lainnya..."></textarea>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button class="btn btn-ghost" style="flex:1" onclick="closeSheet('rejectSheet')">Batal</button>
        <button class="btn" style="flex:2;background:var(--danger);color:white;" onclick="confirmReject()">Tolak Sesi</button>
      </div>
    </div>
  </div>
</div>

<div class="session-detail-toast" id="globalToast"></div>

<script src="../../js/app.js"></script>
<script>
  // Load session from params or default to 'w_009' (upcoming)
  const params = getParams();
  const sessionId = params.id || 'w_009';
  let session = MOCK_SESSIONS_WEEK.find(s => s.id === sessionId) || MOCK_SESSIONS_WEEK.find(s => s.id === 'w_009');

  // Fallback: load from today's sessions
  if (!session) session = MOCK_SESSIONS_TODAY[2];

  const TYPE_MAP   = { Chat: 'chat', Call: 'call', Offline: 'offline' };
  const STATUS_LBL = { done:'Selesai', active:'Berlangsung', upcoming:'Terkonfirmasi', pending:'Menunggu Konfirmasi' };
  const METHOD_ICO = { 'Transfer Bank':'bank', 'GoPay':'gopay', 'OVO':'ovo' };

  function render() {
    const tc = TYPE_MAP[session.sessionType] || 'chat';
    const sl = STATUS_LBL[session.status] || session.status;
    const sc = session.status;

    // Info banner
    let banner = '';
    if (sc === 'active') {
      banner = `<div class="info-banner green" style="margin-top:20px;">
        <svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <span>Sesi sedang berlangsung. Masuk ke ruang sesi untuk melanjutkan.</span>
      </div>`;
    } else if (sc === 'upcoming') {
      banner = `<div class="info-banner blue" style="margin-top:20px;">
        <svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8h.01M12 12v4"/></svg>
        <span>Tombol "Mulai Sesi" akan aktif 5 menit sebelum jadwal dimulai.</span>
      </div>`;
    } else if (sc === 'pending') {
      banner = `<div class="info-banner warn" style="margin-top:20px;">
        <svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>
        <span>Harap tinjau dan respons request ini sesegera mungkin agar klien tidak menunggu terlalu lama.</span>
      </div>`;
    }

    document.getElementById('mainContent').innerHTML = `
      ${banner}

      <!-- Hero Card -->
      <div class="hero-card ${banner?'':''}">
        <div class="hero-top">
          ${avatarGrad(session.userInitials, 52, 20)}
          <div class="hero-info">
            <div class="hero-name">${session.userName}</div>
            <div class="hero-badges">
              <span class="type-chip ${tc}">${session.sessionType}</span>
              <span class="status-pill ${sc}">
                <span class="status-dot ${sc}"></span>${sl}
              </span>
            </div>
          </div>
        </div>
        <div class="hero-divider"></div>
        <div class="info-grid">
          <div class="info-cell">
            <div class="info-cell-label">Tanggal</div>
            <div class="info-cell-val">Kamis, 27 Feb 2025</div>
          </div>
          <div class="info-cell">
            <div class="info-cell-label">Waktu</div>
            <div class="info-cell-val">${session.time} WIB</div>
          </div>
          <div class="info-cell">
            <div class="info-cell-label">Durasi</div>
            <div class="info-cell-val">${session.duration} menit</div>
          </div>
          <div class="info-cell">
            <div class="info-cell-label">Harga</div>
            <div class="info-cell-val primary">${formatRupiah(session.price)}</div>
          </div>
        </div>
      </div>

      <!-- Payment Info -->
      <div class="section-card">
        <div class="section-label">Informasi Pembayaran</div>
        <div class="section-body">
          <div class="detail-row"><div class="detail-key">Metode Pembayaran</div><div class="detail-val">${session.method}</div></div>
          <div class="detail-row"><div class="detail-key">Status Pembayaran</div><div class="detail-val" style="color:#16A34A;">${sc === 'pending' ? 'Pending' : 'Lunas'}</div></div>
          <div class="detail-row"><div class="detail-key">Total Diterima</div><div class="detail-val accent">${formatRupiah(Math.round(session.price * 0.85))} <span style="font-size:10px;font-weight:600;color:var(--text-muted);">(setelah potongan 15%)</span></div></div>
        </div>
      </div>

      <!-- Booking Note -->
      <div class="section-card">
        <div class="section-label">Catatan Booking dari Klien</div>
        <div class="section-body" style="padding-top:12px;">
          <div class="note-box">${session.note}</div>
        </div>
      </div>

      <div style="height:8px;"></div>
    `;

    renderActions();
  }

  function renderActions() {
    const sc = session.status;
    let html = '<div class="action-row">';

    if (sc === 'pending') {
      html += `
        <button class="btn btn-ghost" style="flex:1;color:var(--danger);border-color:rgba(214,40,40,.25);" onclick="openSheet('rejectSheet')">Tolak</button>
        <button class="btn btn-primary" style="flex:2;" onclick="acceptSession()">Terima Sesi</button>
      `;
    } else if (sc === 'upcoming') {
      html += `
        <button class="btn btn-ghost" style="flex:1;" onclick="cancelSession()">Batalkan</button>
        <button class="btn btn-primary" style="flex:2;opacity:.5;cursor:not-allowed;" disabled title="Aktif 5 menit sebelum sesi">Mulai Sesi</button>
      `;
    } else if (sc === 'active') {
      html += `
        <button class="btn btn-primary" style="flex:1;background:linear-gradient(135deg,#059669,#10B981);" onclick="joinSession()">Masuk ke Sesi</button>
      `;
    } else if (sc === 'done') {
      html += `
        <button class="btn btn-primary" style="flex:1;" onclick="goSummary()">Lihat Ringkasan &amp; Catatan</button>
      `;
    }

    html += '</div>';
    document.getElementById('actionBar').innerHTML = html;
  }

  // ── Actions ──
  function acceptSession() {
    session = { ...session, status: 'upcoming' };
    showToast('Sesi berhasil diterima. Klien telah dinotifikasi.');
    render();
  }
  function cancelSession() {
    if (confirm('Yakin ingin membatalkan sesi ini?')) {
      session = { ...session, status: 'done' };
      showToast('Sesi dibatalkan. Dana akan direfund ke klien.');
      render();
    }
  }
  function joinSession() {
    showToast('Membuka ruang sesi... (Phase 2.4)');
  }
  function goSummary() {
    showToast('Membuka ringkasan sesi... (Phase 2.5)');
  }

  // ── Reject ──
  let selectedReason = null;
  function selectReason(el, text) {
    selectedReason = text;
    document.querySelectorAll('.reason-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('reasonInput').classList.toggle('visible', text === 'Lainnya');
  }
  function confirmReject() {
    if (!selectedReason) { showToast('Pilih alasan terlebih dahulu'); return; }
    closeSheet('rejectSheet');
    session = { ...session, status: 'done' };
    showToast('Sesi ditolak. Klien telah dinotifikasi.');
    render();
  }

  function showToast(msg) {
    const el = document.getElementById('globalToast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2800);
  }

  function updateTime() {
    const t = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',hour12:false});
    document.getElementById('headerTime').textContent = t;
  }
  updateTime(); setInterval(updateTime, 10000);

  render();
</script>
</body>
</html>
