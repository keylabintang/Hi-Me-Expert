<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Notifikasi — Hi-Me Expert</title>
  <link rel="stylesheet" href="../../css/global.css">
  <style>
    /* ─── Page Header ─── */
    .page-header {
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky; top: 0; z-index: 10;
    }
    .header-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0;
    }
    .header-title {
      font-size: 17px; font-weight: 800; color: var(--text-primary);
    }
    .header-action {
      font-size: 12px; font-weight: 700; color: var(--primary); cursor: pointer;
    }
    .header-action:active { opacity: .7; }

    /* ─── Filter Tabs ─── */
    .filter-tabs {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 14px;
      scrollbar-width: none;
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tab {
      flex-shrink: 0; padding: 7px 14px; border-radius: 100px;
      font-size: 12px; font-weight: 700;
      border: 1.5px solid var(--border);
      background: transparent; color: var(--text-muted);
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; gap: 5px;
    }
    .filter-tab.active {
      background: var(--primary-pale); border-color: var(--primary);
      color: var(--primary);
    }
    .tab-badge {
      background: var(--primary); color: white;
      font-size: 9px; font-weight: 800;
      border-radius: 100px; padding: 1px 5px; min-width: 16px; text-align: center;
    }
    .filter-tab.active .tab-badge { background: var(--primary); }
    .filter-tab:not(.active) .tab-badge { background: var(--text-muted); }

    /* ─── Notif List ─── */
    .notif-list { padding: 12px 0; }
    .notif-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .1s; position: relative;
    }
    .notif-item:last-child { border-bottom: none; }
    .notif-item:active { background: var(--bg); }
    .notif-item.unread { background: var(--primary-xpale); }
    .notif-item.unread:active { background: var(--primary-pale); }

    /* Unread dot */
    .unread-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--primary);
      position: absolute; top: 50%; left: 8px; transform: translateY(-50%);
      flex-shrink: 0;
    }

    /* Icon */
    .notif-icon {
      width: 40px; height: 40px; border-radius: var(--r-sm); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .notif-icon.request  { background: rgba(15,118,110,.1); color: var(--primary); }
    .notif-icon.session  { background: rgba(58,134,255,.1); color: #3A86FF; }
    .notif-icon.payment  { background: rgba(93,186,132,.1); color: #5DBA84; }
    .notif-icon.rating   { background: rgba(244,162,97,.1); color: #E07B39; }
    .notif-icon.system   { background: rgba(100,116,139,.1); color: var(--text-muted); }

    .notif-content { flex: 1; min-width: 0; }
    .notif-title {
      font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 3px;
    }
    .notif-desc {
      font-size: 12px; color: var(--text-muted); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .notif-time {
      font-size: 10px; font-weight: 600; color: var(--text-placeholder); margin-top: 5px;
    }
    .notif-chevron {
      color: var(--border-dark); flex-shrink: 0; margin-top: 2px;
    }

    /* ─── Empty State ─── */
    .empty-state {
      text-align: center; padding: 60px 24px;
    }
    .empty-icon {
      width: 64px; height: 64px; border-radius: var(--r-lg);
      background: var(--primary-pale); color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .empty-title { font-size: 15px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

    /* ─── Bottom Nav ─── */
    .bottom-nav {
      flex-shrink: 0;
      background: var(--bg-card); border-top: 1px solid var(--border);
      height: var(--nav-h);
      display: grid; grid-template-columns: repeat(4, 1fr);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; cursor: pointer; color: var(--text-muted); padding: 8px 0;
    }
    .nav-item.active { color: var(--primary); }
    .nav-label { font-size: 10px; font-weight: 600; }
    .nav-badge {
      position: absolute; top: 6px; right: 18%;
      min-width: 16px; height: 16px; border-radius: 100px;
      background: var(--danger); color: white;
      font-size: 9px; font-weight: 700; padding: 0 4px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── Toast ─── */
    .notif-toast {
      position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1F2937; color: white; border-radius: var(--r-sm);
      padding: 10px 18px; font-size: 13px; font-weight: 600;
      opacity: 0; transition: all .25s; pointer-events: none; z-index: 200;
      white-space: nowrap;
    }
    .notif-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="phone phone-layout">

  <!-- Header -->
  <div class="page-header">
    <div class="statusbar">
      <span class="status-time" id="headerTime">09:41</span>
      <div class="status-icons">
        <svg class="icon-svg" width="14" height="14" viewBox="0 0 24 24"><path d="M23 7a2 2 0 0 1-2 2H3a2 2 0 0 1 0-4h18a2 2 0 0 1 2 2z"/><rect x="2" y="11" width="20" height="10" rx="2"/></svg>
      </div>
    </div>
    <div class="header-row">
      <div style="display:flex;align-items:center;gap:10px;">
        <button onclick="goBack()" style="background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;">
          <svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="header-title">
          Notifikasi
          <span id="unreadBadge" style="display:inline-flex;align-items:center;justify-content:center;background:var(--danger);color:white;font-size:11px;font-weight:700;border-radius:100px;padding:1px 7px;margin-left:6px;"></span>
        </div>
      </div>
      <div class="header-action" onclick="markAllRead()">Tandai Semua Dibaca</div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">
        Semua
        <span class="tab-badge" id="badge-all"></span>
      </button>
      <button class="filter-tab" data-filter="request" onclick="setFilter('request')">
        <svg class="icon-svg" width="12" height="12" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><path d="M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Request
        <span class="tab-badge" id="badge-request"></span>
      </button>
      <button class="filter-tab" data-filter="session" onclick="setFilter('session')">
        <svg class="icon-svg" width="12" height="12" viewBox="0 0 24 24"><path d="M7 3v4"/><path d="M17 3v4"/><path d="M4 8h16"/><path d="M5 5h14a1 1 0 0 1 1 1v14H4V6a1 1 0 0 1 1-1z"/></svg>
        Sesi
        <span class="tab-badge" id="badge-session"></span>
      </button>
      <button class="filter-tab" data-filter="payment" onclick="setFilter('payment')">
        <svg class="icon-svg" width="12" height="12" viewBox="0 0 24 24"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Pembayaran
        <span class="tab-badge" id="badge-payment"></span>
      </button>
      <button class="filter-tab" data-filter="system" onclick="setFilter('system')">
        <svg class="icon-svg" width="12" height="12" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        Sistem
        <span class="tab-badge" id="badge-system"></span>
      </button>
    </div>
  </div>

  <!-- Scroll Area -->
  <div class="scroll-area" class="has-nav">
    <div class="notif-list" id="notifList"></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item" onclick="go('dashboard')">
      <svg class="icon-svg" width="22" height="22" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5"/><path d="M5 10v9h14v-9"/><path d="M9 19v-6h6v6"/></svg>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-item" onclick="showToast('Halaman Jadwal — Phase 2.3')">
      <svg class="icon-svg" width="22" height="22" viewBox="0 0 24 24"><path d="M7 3v4"/><path d="M17 3v4"/><path d="M4 8h16"/><path d="M5 5h14a1 1 0 0 1 1 1v14H4V6a1 1 0 0 1 1-1z"/></svg>
      <span class="nav-label">Jadwal</span>
    </div>
    <div class="nav-item" onclick="go('chat-list')" style="position:relative;">
      <svg class="icon-svg" width="22" height="22" viewBox="0 0 24 24"><path d="M4 5h16v10H7l-3 3V5z"/></svg>
      <span class="nav-label">Chat</span>
      <div class="nav-badge">1</div>
    </div>
    <div class="nav-item" onclick="showToast('Halaman Profil — Phase 2.6')">
      <svg class="icon-svg" width="22" height="22" viewBox="0 0 24 24"><path d="M20 21a8 8 0 0 0-16 0"/><path d="M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8"/></svg>
      <span class="nav-label">Profil</span>
    </div>
  </div>

</div>

<div class="notif-toast" id="globalToast"></div>

<script src="../../js/app.js"></script>
<script>
  let notifications = MOCK_NOTIFICATIONS.map(n => ({ ...n }));
  let currentFilter = 'all';

  const CATEGORY_ICONS = {
    request: `<svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><path d="M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
    session:  `<svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24"><path d="M7 3v4"/><path d="M17 3v4"/><path d="M4 8h16"/><path d="M5 5h14a1 1 0 0 1 1 1v14H4V6a1 1 0 0 1 1-1z"/></svg>`,
    payment:  `<svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
    rating:   `<svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24"><path d="M12 3l2.8 5.8L21 9.8l-4.5 4.4 1.1 6.3L12 17.8 6.4 20.5l1.1-6.3L3 9.8l6.2-1z"/></svg>`,
    system:   `<svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>`,
  };

  function getFiltered() {
    if (currentFilter === 'all') return notifications;
    return notifications.filter(n => n.category === currentFilter);
  }

  function countUnread(filter) {
    const items = filter === 'all' ? notifications : notifications.filter(n => n.category === filter);
    return items.filter(n => !n.read).length;
  }

  function updateBadges() {
    const cats = ['all','request','session','payment','system'];
    cats.forEach(c => {
      const cnt = countUnread(c);
      const el = document.getElementById(`badge-${c}`);
      el.textContent = cnt || '';
      el.style.display = cnt ? '' : 'none';
    });
    const total = countUnread('all');
    const ub = document.getElementById('unreadBadge');
    ub.textContent = total || '';
    ub.style.display = total ? '' : 'none';
  }

  function renderNotifs() {
    const list = document.getElementById('notifList');
    const items = getFiltered();
    if (!items.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <svg class="icon-svg" width="28" height="28" viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 8-3 8h18s-3-1-3-8"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
          </div>
          <div class="empty-title">Tidak Ada Notifikasi</div>
          <div class="empty-sub">Semua notifikasi di kategori ini sudah ditandai dibaca.</div>
        </div>`;
      return;
    }
    list.innerHTML = items.map(n => `
      <div class="notif-item ${n.read ? '' : 'unread'}" onclick="tapNotif('${n.id}')">
        ${!n.read ? '<div class="unread-dot"></div>' : ''}
        <div class="notif-icon ${n.category}">${CATEGORY_ICONS[n.category] || ''}</div>
        <div class="notif-content">
          <div class="notif-title">${n.title}</div>
          <div class="notif-desc">${n.desc}</div>
          <div class="notif-time">${n.time}</div>
        </div>
        ${n.route ? `<div class="notif-chevron"><svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>` : ''}
      </div>
    `).join('');
    updateBadges();
  }

  function tapNotif(id) {
    const n = notifications.find(x => x.id === id);
    if (!n) return;
    n.read = true;
    renderNotifs();
    if (n.route) {
      showToast(`Membuka halaman... (${n.route})`);
    }
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(el => {
      el.classList.toggle('active', el.dataset.filter === f);
    });
    renderNotifs();
  }

  function markAllRead() {
    notifications.forEach(n => n.read = true);
    renderNotifs();
    showToast('Semua notifikasi telah ditandai dibaca');
  }

  function showToast(msg) {
    let el = document.getElementById('globalToast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2800);
  }

  // Header time
  function updateTime() {
    const t = new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', hour12:false });
    document.getElementById('headerTime').textContent = t;
  }
  updateTime(); setInterval(updateTime, 10000);

  renderNotifs();
</script>
</body>
</html>
